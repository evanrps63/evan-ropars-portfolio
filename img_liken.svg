<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f2e8"/>
      <stop offset="100%" style="stop-color:#ede4cc"/>
    </linearGradient>
    <linearGradient id="lgreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5D866C"/>
      <stop offset="100%" style="stop-color:#3d5a47"/>
    </linearGradient>
    <filter id="lshadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#73543C" flood-opacity=".15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#lbg)"/>

  <!-- Decorative botanical pattern (subtle) -->
  <g opacity=".06">
    <ellipse cx="650" cy="100" rx="180" ry="220" fill="#5D866C" transform="rotate(-20 650 100)"/>
    <ellipse cx="700" cy="80" rx="80" ry="130" fill="#73543C" transform="rotate(15 700 80)"/>
  </g>

  <!-- Big logo display -->
  <g transform="translate(60, 100)" filter="url(#lshadow)">
    <!-- Logo container -->
    <rect width="340" height="180" rx="20" fill="white" opacity=".7"/>
    <!-- likèn text (simulated with shapes) -->
    <text x="30" y="100" fill="#5D866C" font-size="72" font-weight="300"
          font-family="Georgia, serif" font-style="italic" letter-spacing="-2">likèn</text>
    <text x="30" y="135" fill="#73543C" font-size="16" font-family="Georgia, serif" font-style="italic">Sauvage par nature.</text>
    <!-- accent dot -->
    <circle cx="166" cy="50" r="4" fill="#5D866C" opacity=".4"/>
  </g>

  <!-- Color palette display -->
  <g transform="translate(430, 100)">
    <text x="0" y="-10" fill="#73543C" font-size="9" letter-spacing="3" font-family="sans-serif">PALETTE OFFICIELLE</text>
    <rect width="100" height="65" rx="10" fill="#5D866C"/>
    <text x="50" y="42" fill="white" font-size="10" text-anchor="middle" font-family="monospace">#5D866C</text>
    <text x="50" y="55" fill="rgba(255,255,255,.6)" font-size="8" text-anchor="middle" font-family="sans-serif">VERT FORÊT</text>

    <rect x="112" width="100" height="65" rx="10" fill="#73543C"/>
    <text x="162" y="42" fill="white" font-size="10" text-anchor="middle" font-family="monospace">#73543C</text>
    <text x="162" y="55" fill="rgba(255,255,255,.6)" font-size="8" text-anchor="middle" font-family="sans-serif">BRUN SAUVAGE</text>

    <rect x="224" width="100" height="65" rx="10" fill="#EEE0CC" stroke="#d4c4a0" stroke-width="1"/>
    <text x="274" y="42" fill="#73543C" font-size="10" text-anchor="middle" font-family="monospace">#EEE0CC</text>
    <text x="274" y="55" fill="rgba(115,84,60,.5)" font-size="8" text-anchor="middle" font-family="sans-serif">PARCHEMIN</text>
  </g>

  <!-- Typography showcase -->
  <g transform="translate(430, 210)">
    <text x="0" y="-10" fill="#73543C" font-size="9" letter-spacing="3" font-family="sans-serif">TYPOGRAPHIE</text>
    <rect width="330" height="90" rx="12" fill="white" opacity=".5" stroke="#d4c4a0" stroke-width="1"/>
    <text x="16" y="28" fill="#73543C" font-size="24" font-family="Georgia, serif" letter-spacing="-0.5">likèn</text>
    <text x="16" y="42" fill="rgba(115,84,60,.4)" font-size="8" font-family="sans-serif" letter-spacing="1">TAN PEARL REGULAR</text>
    <line x1="16" y1="52" x2="314" y2="52" stroke="#d4c4a0" stroke-width="1"/>
    <text x="16" y="68" fill="#9a8060" font-size="14" font-family="Georgia, serif" font-style="italic">Sauvage par nature.</text>
    <text x="16" y="80" fill="rgba(115,84,60,.4)" font-size="8" font-family="sans-serif" letter-spacing="1">AUTHENTIC SIGNATURE</text>
  </g>

  <!-- GMS mockup label -->
  <g transform="translate(60, 320)">
    <rect width="320" height="100" rx="14" fill="white" opacity=".6" stroke="#d4c4a0" stroke-width="1.5"/>
    <text x="160" y="28" fill="#5D866C" font-size="18" text-anchor="middle" font-family="Georgia, serif" font-style="italic" letter-spacing="-0.5">likèn</text>
    <text x="160" y="48" fill="#1a1208" font-size="11" text-anchor="middle" font-family="sans-serif" letter-spacing="1" font-weight="600">SANGLIER SAUVAGE SÉCHÉ</text>
    <text x="160" y="62" fill="#9a8060" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="1">FAÇON SAUCISSON</text>
    <line x1="40" y1="72" x2="280" y2="72" stroke="#d4c4a0" stroke-width="0.5"/>
    <text x="160" y="86" fill="#9a8060" font-size="8" text-anchor="middle" font-family="sans-serif" letter-spacing="2">100% GIBIER FRANÇAIS</text>
    <!-- border accent -->
    <rect width="320" height="100" rx="14" fill="none" stroke="#5D866C" stroke-width="1.5" opacity=".4"/>
  </g>

  <!-- Tags -->
  <g transform="translate(430, 345)">
    <rect width="90" height="24" rx="12" fill="#5D866C" opacity=".15"/>
    <text x="45" y="16" fill="#5D866C" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="1" font-weight="600">BRANDING</text>

    <rect x="100" width="60" height="24" rx="12" fill="#73543C" opacity=".12"/>
    <text x="130" y="16" fill="#73543C" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="1" font-weight="600">NAMING</text>

    <rect x="170" width="60" height="24" rx="12" fill="#5D866C" opacity=".12"/>
    <text x="200" y="16" fill="#5D866C" font-size="9" text-anchor="middle" font-family="sans-serif" letter-spacing="1" font-weight="600">GMS</text>
  </g>

  <!-- Bottom label -->
  <text x="60" y="448" fill="#1a1208" font-size="36" font-weight="bold" letter-spacing="-1.5" font-family="sans-serif">Likèn</text>
  <text x="60" y="472" fill="#9a8060" font-size="12" letter-spacing="2" font-family="sans-serif">BRAND IDENTITY COMPLÈTE · 2025</text>
</svg>